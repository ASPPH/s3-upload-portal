name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment configuration
        id: config
        run: |
          AWS_ROLE_ARN=$(jq -r '.aws_role_arn' .github/config/prod.json)
          echo "aws_role_arn=$AWS_ROLE_ARN" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.aws_role_arn }}
          aws-region: us-east-1

      - name: Validate CloudFormation templates
        run: |
          for template in cloudformation/*.yaml; do
            echo "Validating $template..."
            aws cloudformation validate-template --template-body file://$template
          done

  test:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_SECURITY_TOKEN: testing
      AWS_SESSION_TOKEN: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short

  deploy:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment configuration
        id: config
        run: |
          CONFIG_FILE=".github/config/prod.json"
          AWS_ROLE_ARN=$(jq -r '.aws_role_arn' $CONFIG_FILE)
          DEPLOYMENT_BUCKET=$(jq -r '.deployment_bucket' $CONFIG_FILE)
          TARGET_BUCKET=$(jq -r '.target_bucket' $CONFIG_FILE)
          STACK_NAME=$(jq -r '.stack_name' $CONFIG_FILE)
          ENVIRONMENT=$(jq -r '.environment' $CONFIG_FILE)
          UPLOAD_PREFIX=$(jq -r '.upload_prefix' $CONFIG_FILE)
          ALLOWED_CONTENT_TYPES=$(jq -r '.allowed_content_types' $CONFIG_FILE)
          ALLOWED_ORIGIN=$(jq -r '.allowed_origin' $CONFIG_FILE)
          echo "aws_role_arn=$AWS_ROLE_ARN" >> $GITHUB_OUTPUT
          echo "deployment_bucket=$DEPLOYMENT_BUCKET" >> $GITHUB_OUTPUT
          echo "target_bucket=$TARGET_BUCKET" >> $GITHUB_OUTPUT
          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "upload_prefix=$UPLOAD_PREFIX" >> $GITHUB_OUTPUT
          echo "allowed_content_types=$ALLOWED_CONTENT_TYPES" >> $GITHUB_OUTPUT
          echo "allowed_origin=$ALLOWED_ORIGIN" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.aws_role_arn }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Package Lambda function
        run: |
          mkdir -p build
          cp src/lambda/handler.py build/
          pip install boto3 -t build/
          cd build && zip -r ../lambda.zip . && cd ..

      - name: Upload Lambda package to S3
        id: upload_lambda
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          LAMBDA_KEY="lambda/s3-upload-portal-${TIMESTAMP}.zip"
          aws s3 cp lambda.zip s3://${{ steps.config.outputs.deployment_bucket }}/${LAMBDA_KEY}
          echo "lambda_key=${LAMBDA_KEY}" >> $GITHUB_OUTPUT

      - name: Upload CloudFormation templates to S3
        run: |
          aws s3 cp cloudformation/ s3://${{ steps.config.outputs.target_bucket }}/cloudformation/ --recursive

      - name: Deploy CloudFormation stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ steps.config.outputs.stack_name }}
          template: cloudformation/main.yaml
          parameter-overrides: >-
            Environment=${{ steps.config.outputs.environment }},
            TargetBucketName=${{ steps.config.outputs.target_bucket }},
            AllowedOrigin=${{ steps.config.outputs.allowed_origin }},
            UploadPrefix=${{ steps.config.outputs.upload_prefix }},
            AllowedContentTypes=${{ steps.config.outputs.allowed_content_types }}
          capabilities: CAPABILITY_NAMED_IAM
          no-fail-on-empty-changeset: "1"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name s3-upload-portal-${{ steps.config.outputs.environment }} \
            --s3-bucket ${{ steps.config.outputs.deployment_bucket }} \
            --s3-key ${{ steps.upload_lambda.outputs.lambda_key }}

      - name: Get frontend bucket name
        id: frontend
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ steps.config.outputs.stack_name }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name ${{ steps.config.outputs.stack_name }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomain'].OutputValue" \
            --output text)
          echo "bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_domain=$DISTRIBUTION_DOMAIN" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        run: |
          aws s3 sync src/frontend/ s3://${{ steps.frontend.outputs.bucket }}/ \
            --delete \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?DomainName=='${{ steps.frontend.outputs.distribution_domain }}'].Id" \
            --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $DISTRIBUTION_ID \
              --paths "/*"
          fi

      - name: Display outputs
        run: |
          echo "Portal URL:"
          aws cloudformation describe-stacks \
            --stack-name ${{ steps.config.outputs.stack_name }} \
            --query "Stacks[0].Outputs[?OutputKey=='PortalUrl'].OutputValue" \
            --output text
          echo "API Endpoint:"
          aws cloudformation describe-stacks \
            --stack-name ${{ steps.config.outputs.stack_name }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text
